<style>

.wrapper {
  max-width: 1000px;
}

main.page-content article.post {
  margin-top: 0;
}

main.page-content article.post .post-header {

}

main.page-content .post-content {
  margin-top: 0;
  padding-top: 15px;
}

main.page-content .section-header {

}

table.general thead th {

  color: #284b63;

}

}

}

}

.right-group {

}

  align-items: stretch;

  padding-left: 24px;
  border-left: 1px solid rgba(40, 75, 99, 0.24);
}

  height: 42px;
  box-sizing: border-box;

  color: #1c1c1e;
  font-size: 16px;

  padding: 8px 12px 8px 40px;

  border: 1px solid rgba(40, 75, 99, 0.32);

    box-shadow 0.15s ease,
    background-color 0.15s ease;
}

  color: #77716a;
}

.dropdown-toggle:hover {
  border-color: rgba(40, 75, 99, 0.5);
  background-color: rgba(255, 253, 248, 0.94);
}

#input:focus,
select:focus,
.custom-dropdown.open .dropdown-toggle,
.dropdown-toggle:focus {
  outline: none;
  border-color: rgba(40, 75, 99, 0.66);
  box-shadow: 0 0 0 2px rgba(40, 75, 99, 0.12);
}

.search-meta {
  min-height: 20px;
}

#search-count {
  color: #5f5951;
  font-size: 14px;
}

#voice-container,

#year-container::before,
#genre-container::before,
#voice-container::before,
#source-container::before,
#mensuration-container::before,

#year-container::before {
  content: "Year";

#genre-container::before {
  content: "Genre";
}

#voice-container::before {
  content: "Voices";

#source-container::before {

#mensuration-container::before {

select,

  border: 1px solid rgba(40, 75, 99, 0.32);

  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;

  background-image: url('data:image/svg+xml;utf8,\
<svg fill="%23284b63" height="18" viewBox="0 0 24 24" width="18" xmlns="http://www.w3.org/2000/svg">\
<path d="M7 10l5 5 5-5z"/>\
</svg>');

    box-shadow 0.15s ease,
    background-color 0.15s ease;

  display: block;
}

.dropdown-toggle {

  align-items: center;
  justify-content: space-between;
  padding: 6px 30px 6px 9px;
  text-align: left;
}

.dropdown-toggle .toggle-text {
  overflow: hidden;
  text-align: left;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.custom-dropdown .dropdown-content {
  display: none;
  position: absolute;
  top: calc(100% + 5px);
  left: 0;
  z-index: 99;

  max-width: 300px;
  min-width: 226px;
  padding: 8px;

  border: 1px solid rgba(40, 75, 99, 0.2);
  border-radius: 6px;
  background-color: #fffdf8;

  align-items: center;
  justify-content: center;

    padding-left: 0;

    grid-template-columns: repeat(2, minmax(0, 1fr));
    justify-content: stretch;

  #texted-container {
    grid-column: auto;
    padding-left: 0;
  }
}

@media (max-width: 940px) and (min-width: 821px) {
