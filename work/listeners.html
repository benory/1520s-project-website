//////////////////////////////
//
// initializeErrorReportModal -- Configure the work-page error report popup.
//

function initializeErrorReportModal() {
	let modal = document.querySelector("#error-report-modal");
	let openButton = document.querySelector("#error-report-open");
	let form = document.querySelector("#error-report-form");

	if (!modal || !openButton || !form) {
		return;
	}

	let dialog = modal.querySelector(".error-report-dialog");
	let titleEl = modal.querySelector("#error-report-title");
	let introEl = modal.querySelector("#error-report-intro");
	let successEl = modal.querySelector("#error-report-success");
	let targetEl = form.querySelector("#error_report_target");
	let targetDisplayEl = form.querySelector("#error_report_target_display");
	let descriptionEl = form.querySelector("#error_report_description");
	let emailEl = form.querySelector("#error_report_email");
	let userAgentEl = form.querySelector("#error_report_user_agent");
	let statusEl = form.querySelector("#error-report-status");
	let submitButton = form.querySelector('[type="submit"]');
	let closeControls = modal.querySelectorAll("[data-error-report-close]");
	let returnFocusElement = null;
	let focusableSelector = [
		"a[href]",
		"button:not([disabled])",
		"textarea:not([disabled])",
		"input:not([disabled])",
		"select:not([disabled])",
		'[tabindex]:not([tabindex="-1"])'
	].join(",");

	function isValidEmail(value) {
		return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
	}

	function currentWorkUrl() {
		let url = new URL(window.location.href);
		if (DATA1520.workid) {
			url.searchParams.set("id", DATA1520.workid);
		}
		return url.toString();
	}

	function formatComposerName(composer) {
		if (!composer) {
			return "";
		}
		let matches = composer.match(/^(.*?)\s*,\s*(.*?)$/);
		if (matches) {
			return `${matches[2]} ${matches[1]}`;
		}
		return composer;
	}

	function escapeHtml(value) {
		return String(value)
			.replace(/&/g, "&amp;")
			.replace(/</g, "&lt;")
			.replace(/>/g, "&gt;")
			.replace(/"/g, "&quot;")
			.replace(/'/g, "&#39;");
	}

	function currentWorkLabelText() {
		let id = DATA1520.workid || DATA1520.cgi.id || "Jac2001";
		let workinfo = DATA1520.lookup.works ? DATA1520.lookup.works[id] : null;
		if (!workinfo) {
			return currentWorkUrl();
		}

		let composer = formatComposerName(workinfo.Composer);
		let title = workinfo.Title || "Untitled work";
		let subtitle = workinfo.Subtitle;
		let titleText = subtitle ? `${title}, ${subtitle}` : title;
		let label = composer ? `${composer}, ${titleText}` : titleText;
		return `${label} (${id})`;
	}

	function currentWorkLabelHtml() {
		let id = DATA1520.workid || DATA1520.cgi.id || "Jac2001";
		let workinfo = DATA1520.lookup.works ? DATA1520.lookup.works[id] : null;
		if (!workinfo) {
			return escapeHtml(currentWorkUrl());
		}

		let composer = formatComposerName(workinfo.Composer);
		let title = workinfo.Title || "Untitled work";
		let subtitle = workinfo.Subtitle;
		let titleText = `<i>${escapeHtml(title)}</i>`;
		if (subtitle) {
			titleText += `, ${escapeHtml(subtitle)}`;
		}
		let label = composer ? `${escapeHtml(composer)}, ${titleText}` : titleText;
		return `${label} (${escapeHtml(id)})`;
	}

	function setReportContext() {
		let workLabel = currentWorkLabelText();
		if (targetDisplayEl) {
			targetDisplayEl.innerHTML = currentWorkLabelHtml();
		}
		if (targetEl) {
			targetEl.value = workLabel;
		}
		if (userAgentEl) {
			userAgentEl.value = navigator.userAgent;
		}
	}

	function setStatus(message, modifier) {
		if (!statusEl) {
			return;
		}
		statusEl.className = modifier
			? `error-report-status error-report-status--${modifier}`
			: "error-report-status";
		statusEl.textContent = message;
	}

	function resetTurnstile() {
		if (window.turnstile && typeof window.turnstile.reset === "function") {
			window.turnstile.reset();
		}
	}

	function isConfigured() {
		let endpoint = form.getAttribute("action");
		return endpoint && endpoint.trim();
	}

	function showFormView() {
		modal.classList.remove("error-report-modal--success");
		if (titleEl) {
			titleEl.textContent = "Report an error";
		}
		if (introEl) {
			introEl.classList.remove("hidden");
		}
		form.classList.remove("hidden");
		if (successEl) {
			successEl.classList.add("hidden");
		}
		modal.setAttribute("aria-describedby", "error-report-intro");
	}

	function showSuccessView() {
		modal.classList.add("error-report-modal--success");
		if (titleEl) {
			titleEl.textContent = "Thank you for your report.";
		}
		if (introEl) {
			introEl.classList.add("hidden");
		}
		form.classList.add("hidden");
		if (successEl) {
			successEl.classList.remove("hidden");
		}
		modal.setAttribute("aria-describedby", "error-report-success-message");
		window.requestAnimationFrame(function() {
			if (successEl) {
				successEl.focus();
			}
		});
	}

	function getFocusableElements() {
		return Array.from(dialog.querySelectorAll(focusableSelector)).filter(function(element) {
			return element.offsetParent !== null;
		});
	}

	function openModal() {
		returnFocusElement = document.activeElement;
		showFormView();
		setReportContext();
		setStatus("");
		modal.classList.remove("hidden");
		document.body.classList.add("error-report-modal-open");
		window.requestAnimationFrame(function() {
			if (descriptionEl) {
				descriptionEl.focus();
			} else if (dialog) {
				dialog.focus();
			}
		});
	}

	function closeModal() {
		modal.classList.add("hidden");
		document.body.classList.remove("error-report-modal-open");
		if (returnFocusElement && typeof returnFocusElement.focus === "function") {
			returnFocusElement.focus();
		}
	}

	function handleModalKeydown(event) {
		if (modal.classList.contains("hidden")) {
			return;
		}

		if (event.key === "Escape") {
			event.preventDefault();
			closeModal();
			return;
		}

		if (event.key !== "Tab") {
			return;
		}

		let focusableElements = getFocusableElements();
		if (!focusableElements.length) {
			event.preventDefault();
			dialog.focus();
			return;
		}

		let first = focusableElements[0];
		let last = focusableElements[focusableElements.length - 1];
		if (!focusableElements.includes(document.activeElement)) {
			event.preventDefault();
			if (event.shiftKey) {
				last.focus();
			} else {
				first.focus();
			}
			return;
		}
		if (event.shiftKey && document.activeElement === first) {
			event.preventDefault();
			last.focus();
		} else if (!event.shiftKey && document.activeElement === last) {
			event.preventDefault();
			first.focus();
		}
	}

	openButton.addEventListener("click", openModal);
	for (let i=0; i<closeControls.length; i++) {
		closeControls[i].addEventListener("click", closeModal);
	}
	document.addEventListener("keydown", handleModalKeydown);

	form.addEventListener("submit", async function(event) {
		event.preventDefault();

		if (!isConfigured()) {
			setStatus("Error reporting is not configured yet.", "error");
			return;
		}

		let description = descriptionEl ? descriptionEl.value.trim() : "";
		let email = emailEl ? emailEl.value.trim() : "";
		let turnstileWidget = form.querySelector(".cf-turnstile");
		let turnstileToken = form.querySelector('[name="cf-turnstile-response"]')?.value.trim();

		if (!description || !email) {
			setStatus("Please complete all required fields.", "error");
			return;
		}

		if (!isValidEmail(email)) {
			setStatus("Please enter a valid email address.", "error");
			return;
		}

		if (turnstileWidget && !turnstileToken) {
			setStatus("Please complete the verification.", "error");
			return;
		}

		setReportContext();
		setStatus("Submitting error report...");
		submitButton.disabled = true;

		try {
			let response = await fetch(form.getAttribute("action").trim(), {
				method: "POST",
				body: new FormData(form),
			});

			let result = await response.json().catch(function() {
				return {};
			});

			if (!response.ok || !result.ok) {
				throw new Error(result.error || "Submission failed");
			}

			form.reset();
			setReportContext();
			resetTurnstile();
			setStatus("");
			showSuccessView();
		} catch (error) {
			console.error("Error report submission failed:", error);
			resetTurnstile();
			setStatus("Sorry, your report could not be submitted. Please try again.", "error");
		} finally {
			submitButton.disabled = false;
		}
	});
}


//////////////////////////////
//
// toggleAnalysisDisplay -- Show or hide analysis plots.
//

function setAnalysisToggleState(target, isActive) {
	target.classList.toggle("active", isActive);
	if (target.hasAttribute("aria-pressed")) {
		target.setAttribute("aria-pressed", isActive ? "true" : "false");
	}
	if (target.hasAttribute("aria-expanded")) {
		target.setAttribute("aria-expanded", isActive ? "true" : "false");
	}
}


function downloadAnalysisDataIfNeeded(container, analysisType, ext) {
	if (!container.innerHTML.length) {
		downloadData(container, analysisType, ext);
	}
}


function toggleSingleAnalysisDisplay(target) {
	let analysisType = target.id;
	if (!analysisType) {
		console.warn("Analysis element ID was not given");
		return;
	}
	let ext = target.dataset.ext;
	if (!ext) {
		console.warn("File extension was not given.");
		return;
	}
	let container = document.querySelector(`#${analysisType}-display`);
	if (!container) {
		console.warn("No analysis container", `#${analysisType}-display`);
		return;
	}
	let willShow = container.classList.contains("hidden");
	if (willShow) {
		downloadAnalysisDataIfNeeded(container, analysisType, ext);
		container.classList.remove("hidden");
	} else {
		container.classList.add("hidden");
	}
	setAnalysisToggleState(target, willShow);
}


function getSelectedRangeAnalysisType() {
	let rangeMode = document.querySelector("#work-range-mode");
	if (rangeMode && rangeMode.checked) {
		return "prange-duration";
	}
	return "prange-attack";
}


function updateRangeModeLabels() {
	let selectedType = getSelectedRangeAnalysisType();
	let labels = document.querySelectorAll("#prange-display .work-range-mode-label");
	for (let i=0; i<labels.length; i++) {
		let isSelected = (
			(labels[i].dataset.rangeLabel === "attack" && selectedType === "prange-attack") ||
			(labels[i].dataset.rangeLabel === "duration" && selectedType === "prange-duration")
		);
		labels[i].classList.toggle("is-active", isSelected);
	}
}


function showSelectedRangeAnalysis() {
	let selectedType = getSelectedRangeAnalysisType();
	let plots = document.querySelectorAll("#prange-display .range-plot");
	for (let i=0; i<plots.length; i++) {
		plots[i].classList.toggle("hidden", plots[i].id !== `${selectedType}-display`);
	}
	let container = document.querySelector(`#${selectedType}-display`);
	if (container) {
		downloadAnalysisDataIfNeeded(container, selectedType, "svg");
	}
	updateRangeModeLabels();
}


function getSelectedActivityAnalysisType() {
	let activityMode = document.querySelector("#work-activity-mode");
	if (activityMode && activityMode.checked) {
		return "activity-separate-notitle";
	}
	return "activity-merged-notitle";
}


function updateActivityModeLabels() {
	let selectedType = getSelectedActivityAnalysisType();
	let labels = document.querySelectorAll("#activity-display .work-range-mode-label");
	for (let i=0; i<labels.length; i++) {
		let isSelected = (
			(labels[i].dataset.activityLabel === "merged" && selectedType === "activity-merged-notitle") ||
			(labels[i].dataset.activityLabel === "separate" && selectedType === "activity-separate-notitle")
		);
		labels[i].classList.toggle("is-active", isSelected);
	}
}


function showSelectedActivityAnalysis() {
	let selectedType = getSelectedActivityAnalysisType();
	let plots = document.querySelectorAll("#activity-display .activity-plot");
	for (let i=0; i<plots.length; i++) {
		plots[i].classList.toggle("hidden", plots[i].id !== `${selectedType}-display`);
	}
	let container = document.querySelector(`#${selectedType}-display`);
	if (container) {
		downloadAnalysisDataIfNeeded(container, selectedType, "png");
	}
	updateActivityModeLabels();
}


function toggleActivityAnalysis(target) {
	let container = document.querySelector("#activity-display");
	if (!container) {
		console.warn("No analysis container", "#activity-display");
		return;
	}
	let willShow = container.classList.contains("hidden");
	if (willShow) {
		container.classList.remove("hidden");
		showSelectedActivityAnalysis();
	} else {
		container.classList.add("hidden");
	}
	setAnalysisToggleState(target, willShow);
}


function toggleVocalRangeAnalysis(target) {
	let container = document.querySelector("#prange-display");
	if (!container) {
		console.warn("No analysis container", "#prange-display");
		return;
	}
	let willShow = container.classList.contains("hidden");
	if (willShow) {
		container.classList.remove("hidden");
		showSelectedRangeAnalysis();
	} else {
		container.classList.add("hidden");
	}
	setAnalysisToggleState(target, willShow);
}


document.addEventListener("click", function(event) {
	let target = event.target.closest(".analysis-toggle");
	if (!target) {
		return;
	}
	if (target.dataset.analysisGroup === "activity") {
		toggleActivityAnalysis(target);
		return;
	}
	if (target.dataset.analysisGroup === "vocal-ranges") {
		toggleVocalRangeAnalysis(target);
		return;
	}
	toggleSingleAnalysisDisplay(target);
});


document.addEventListener("change", function(event) {
	if (event.target.id === "work-range-mode") {
		showSelectedRangeAnalysis();
		return;
	}
	if (event.target.id === "work-activity-mode") {
		showSelectedActivityAnalysis();
	}
});



//////////////////////////////
//
// click event listener -- Event delegate listener for starting playback at a certain note.
//

window.addEventListener("click", function(event) {
	let target = event.target;
	let noteElement = null;

	// Find the g.note element that was clicked on.  This may not be
	// the actual element that was clicked on, but rather it could
	// be a parent element, so search the ancestors of the clicked
	// element to find g.note.  The ID of the note will start "note-".
	if (target && target.id && target.id.match(/^note-/)) {
		noteElement = target;
	} else {
		while ((!noteElement) && target) {
			target = target.parentNode;
			if (!target) {
				break;
			}
			if (target && target.id && target.id.match(/^note-/)) {
				noteElement = target;
				break;
			}
		}
	}
	if (!noteElement) {
		// Did not click on a note (or in the SVG), so give up.
		return;
	}

	// Get the start time of the note (quarter notes from begiining of score):
	let matches;
	let ques = 0;
	if (matches = noteElement.className.baseVal.match(/qon-([^\s]+)/)) {
		ques = getQstampFloat(matches[1]);
	} else {
		return;
	}

	// Find the time in seconds for the note from the timemap:
	let tstamp = -1;
	let qstamp = -1;
	let timemap = DATA1520.timemap;
	if (!timemap) {
		console.warn("Warning: cannot find timemap for highligting notation during playback.");
		return;
	}
	for (let i=0; i<timemap.length; i++) {
		if (Math.abs(timemap[i].qstamp - ques) < 0.01) {
			tstamp = timemap[i].tstamp;
			qstamp = timemap[i].qstamp;
			break;
		}
	}
	if (tstamp < 0) {
		return;
	}

	console.log("TSTAMP", tstamp, "QSTAMP", qstamp);

	let audio = DATA1520.audio;
	console.warn("CURRENT TIME", audio.currentTime);
	let adjustment = 0;
	if (audio.paused) {
		unhighlightAllNotesInSvg();
		audio.play();
		audio.currentTime = tstamp - adjustment;
	} else {
		unhighlightAllNotesInSvg();
		try {
			audio.currentTime = tstamp - adjustment;
		} catch (error) {
			console.error("Error:", error);
		}
	}
});



//////////////////////////////
//
// initializeAudio -- Prepare audio for the current work.
//

function initializeAudio(id) {
	DATA1520.audio = document.querySelector("audio#audio");
	let audio = DATA1520.audio;

	if (!audio) {
		console.error("Error: Cannot find audio#audio on webpage.");
		return;
	}

	// audio.innerHTML = `<source src="${DATA1520.dataurl}/${DATA1520.workid}.mp3" type="audio/mpeg" preload="metadata" />`;
	// Set the audio infomation explicitly:
	let audioUrl = `${DATA1520.dataurl}/${DATA1520.workid}.mp3`;
	audio.preload = "auto";
	audio.src = audioUrl;
	audio.load();

	audio.addEventListener('loadedmetadata', function() {
		console.log("Metadata for audio loaded. Duration:", audio.duration);
		console.log("Audio readyState:", audio.readyState);
		console.log("Audio seekable length: ", audio.seekable.length);
		console.log('Audio source:', audio.src);
		printSeekableAudioInfo();
	});


	audio.addEventListener('progress', function() {
		// printSeekableAudioInfo();
	});


	audio.addEventListener('canplay', function() {
		// console.log("Audio can play.");
		// printSeekableAudioInfo();
	});


	audio.addEventListener('canplaythrough', function() {
		// console.log("Audio can play through.");
		// printSeekableAudioInfo();
	});


	audio.addEventListener('error', function() {
		console.error(`Error loading the audio file ${audioUrl}`);
	});


	audio.addEventListener('loadeddata', function() {
		console.log(`Audio data loaded: ${audioUrl}`);
	});

	audio.addEventListener('stalled', function() {
		console.warn("Audio loading stalled, reloading...");
		audio.load();  // Force a reload if loading stalls
	});

	audio.addEventListener('waiting', function() {
		console.warn("Audio is waiting for data, might not be seekable...");
	});

	audio.addEventListener("play", playAudioCallback);
	audio.addEventListener("playing", playAudioCallback);
	audio.addEventListener("pause", pauseAudioCallback);


	let url = `${DATA1520.dataurl}/${DATA1520.workid}-timemap.json`;
	console.warn("TIMEMAP URL", url);
	fetch(url)
	.then(response => {
		if (!response.ok) {
			throw new Error('Network response was not ok');
		}
		return response.json();
	})
	.then(data => {
		DATA1520.timemap = data;
		console.warn("TIMEMAP", DATA1520.timemap);
	})
	.catch(error => {
		console.error('There was a problem with the fetch operation:', error);
	});

}



//////////////////////////////
//
// keydown event listener -- For keyboard shortcuts.
//

function shouldIgnoreAudioShortcut(event) {
	let target = event.target;
	if (document.body.classList.contains("error-report-modal-open")) {
		return true;
	}
	if (target && target.closest) {
		return Boolean(target.closest("input, textarea, select, button, [contenteditable='true']"));
	}
	return false;
}

document.addEventListener('keydown', function(event) {
    if ((event.code === 'Space' || event.keyCode === 32) && !shouldIgnoreAudioShortcut(event)) {
        event.preventDefault();
        togglePlayPauseOfAudio();
    }
});
