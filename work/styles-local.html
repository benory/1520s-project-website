<style>

{% include styles/score.css %}

* { cursor: inherit; }

body.wait {
	cursor: wait !important;
}

body {
  font-family: -apple-system, BlinkMacSystemFont,
               "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

main {
	margin-left: 30px;
	margin-right: 30px;
}

.page-content {
	min-width: 500px;
}

#work-info {
  --work-info-indent: 1.1rem;
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 14px;
  line-height: 1.45;
  box-sizing: border-box;
  margin-top: 14px;
  background: #f7f8f7;
  border: 1px solid #c5cdd0;
  border-radius: 4px;
  padding: 13px 16px 14px;
}

#work-info thead {
  display: none;
}

#work-info tbody tr {
  display: grid;
  grid-template-columns: minmax(210px, max-content) minmax(270px, 36%) minmax(300px, 34%);
  justify-content: space-between;
  column-gap: clamp(30px, 4vw, 64px);
}

#work-info td {
  border: none;
  vertical-align: top;
  padding: 0;
  min-width: 0;
}

#work-info td:nth-child(3) {
  justify-self: end;
  width: 100%;
  max-width: 460px;
}

#work-info td::before {
  content: attr(data-section-label);
  display: block;
  margin-bottom: 6px;
  color: #0f2d4a;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  line-height: 1;
  text-transform: uppercase;
}

#work-footer {
	max-height: 100px;
	font-size: 1.25rem;
	width: 100%;
	display: flex;
	flex-wrap: wrap;
	flex-basis: 25%;
	flex-direction: column;
}

.work-item .key {
	font-weight: bold;
	display: inline-block;
}

.work-item .key:after {
	content: ":";
	padding-right: 10px;
}

.work-item {
	display: flex;
	flex-wrap: wrap;
	align-items: baseline;
	column-gap: 6px;
	margin-bottom: 5px;
}

.work-item:last-child {
	margin-bottom: 0;
}

.work-item b {
  flex: 0 0 auto;
  color: #242b2f;
  font-weight: 650;
}

.source-item b::after {
	content: " ";
}

.info-link {
	font-size: 12px;
	opacity: 1;
}

.source-item {
	display: block;
	padding-left: var(--work-info-indent);
	text-indent: calc(-1 * var(--work-info-indent));
	white-space: normal;
}

.source-value {
	display: inline;
	padding-left: 0;
	text-indent: 0;
	overflow-wrap: break-word;
	white-space: normal;
}

#work-info a,
#external-info a {
	color: #007aff;
}

#work-info a:hover,
#external-info a:hover {
	color: #007aff;
	text-decoration: underline;
}

.work-link-group {
	display: grid;
	grid-template-columns: max-content minmax(0, 1fr);
	column-gap: 6px;
	align-items: baseline;
}

.mensuration-item {
	display: grid;
	grid-template-columns: max-content minmax(0, 1fr);
	column-gap: 6px;
	align-items: center;
}

.work-link-group b {
	margin-top: 0;
}

.work-link-list {
	display: inline-flex;
	flex-wrap: nowrap;
	align-items: baseline;
	gap: 4px;
	min-width: 0;
	line-height: 1.45;
}

.work-action-link {
	display: inline;
	color: #007aff;
	font-size: 13px;
	line-height: 1.25;
	text-decoration: none;
	white-space: nowrap;
}

.work-action-link:hover {
	color: #007aff;
	text-decoration: underline;
}

.work-link-separator {
	color: #758187;
	font-size: 12px;
}

.mensuration-signs {
	display: inline-flex;
	align-items: center;
	gap: 4px;
	min-width: 0;
	line-height: 1;
	position: relative;
	top: 3px;
	vertical-align: middle;
}

#external-info {
	margin: 10px 0 14px;
}

.external-note {
	padding: 9px 12px;
	color: #24333b;
	background: #eef3f5;
	border: 1px solid #ccd6da;
	border-radius: 4px;
	font-size: 13.5px;
	line-height: 1.45;
}

.button,
.analysis-toggle.button {
  appearance: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;

  height: 32px;
  padding: 0 11px;

  font-family: inherit;
  font-size: 13.5px;
  font-weight: 500;
  line-height: 1;
  text-decoration: none;
  white-space: nowrap;

  color: #142f46;
  background: #f8f9f8;
  border: 1px solid #b9c4c8;
  border-radius: 4px;
  box-shadow: 0 1px 2px rgba(12, 24, 32, 0.04);

  cursor: pointer;

  transition:
    background-color 0.15s ease,
    border-color 0.15s ease,
    box-shadow 0.15s ease,
    transform 0.08s ease;
}

.button:hover,
.analysis-toggle.button:hover {
  color: #071f36;
  border-color: #8498a4;
  background: #eef3f5;
}

.filter-toggle.button.active,
.analysis-toggle.button.active {
  color: #ffffff;
  border-color: #123654;
  background: #123654;
}

.button:active,
.analysis-toggle.button:active {
  transform: translateY(1px);
  box-shadow: none;
}

.hidden {
	display: none !important;
	background: red !important;
}

.button-container {
  display: flex;
  flex-wrap: wrap;
  gap: 7px 8px;
  align-items: center;
  margin: 12px 0 10px;
}

#analysis-plots {
	text-align: center;
	margin: 0 0 18px;
}

#accidentalSelect .button {
	min-width: 192px;
	text-align: center;
}

#accidentalSelect {
	display: inline-flex;
}

.analysis-plot {
	text-align: center;
	margin-left: auto;
	margin-right: auto;
	max-width: 763px;
	width: 100%;
	overflow-x: auto;
	box-sizing: border-box;
}

.analysis-plot svg {
	width: 100%;
	min-width: 720px;
	height: auto;
	display: block;
	margin: 0 auto;
}

.analysis-plot img {
	max-width: 100%;
	height: auto;
}

.analysis-panel {
	padding: 10px 12px 14px;
	background: #fbfcfc;
	border: 1px solid #d4dde1;
	border-radius: 5px;
	box-shadow: 0 1px 2px rgba(12, 24, 32, 0.035);
}

.activity-analysis-plot a {
	display: flex;
	justify-content: center;
	width: 100%;
}

.activity-analysis-plot img {
	display: block;
	width: 100%;
	max-width: 1000px;
	margin: 0 auto;
}

.activity-analysis-plot .work-activity-controls,
.range-analysis-plot .work-range-controls {
	display: flex;
	justify-content: flex-start;
	margin: 0 0 10px;
}

.work-range-mode-toggle {
	align-items: center;
	color: #5c6a70;
	cursor: pointer;
	display: inline-flex;
	font-size: 13px;
	font-weight: 500;
	gap: 8px;
	line-height: 18px;
}

.work-range-mode-toggle input {
	opacity: 0;
	position: absolute;
	pointer-events: none;
}

.work-range-mode-label.is-active {
	color: #102d45;
}

.work-range-mode-switch {
	background: #dbe4e8;
	border: 1px solid #b7c5cc;
	border-radius: 999px;
	display: inline-block;
	height: 20px;
	position: relative;
	transition: background-color 120ms ease, border-color 120ms ease;
	width: 40px;
}

.work-range-mode-switch::after {
	background: #ffffff;
	border-radius: 50%;
	box-shadow: rgba(0, 0, 0, 0.2) 0 1px 2px;
	content: "";
	height: 16px;
	left: 2px;
	position: absolute;
	top: 1px;
	transition: transform 120ms ease;
	width: 16px;
}

.work-range-mode-toggle input:checked + .work-range-mode-switch {
	background: #123654;
	border-color: #123654;
}

.work-range-mode-toggle input:checked + .work-range-mode-switch::after {
	transform: translateX(20px);
}

.analysis-help-note {
	margin: 0 0 10px;
	color: #364850;
	font-size: 12.5px;
	line-height: 1.42;
	text-align: left;
}

.analysis-help-note summary {
	width: max-content;
	color: #123654;
	cursor: pointer;
	font-weight: 600;
}

.analysis-help-note p {
	margin: 6px 0 0;
}

.range-plot {
	width: 100%;
}

.range-plot a {
	display: block;
	width: 100%;
}

.range-plot .analysis-svg {
	display: block;
	width: 100% !important;
	min-width: 0;
	max-width: 100%;
	height: auto !important;
	margin: 0 auto;
}

.play, .mp3play,
.pause, .mp3pause {
  display: inline-flex;
  align-items: center;
  justify-content: center;

  text-indent: -19999px;
  background: url('/images/mp3.svg') no-repeat center;

  width: 46px;
  height: 32px;

  margin-right: 4px;
  position: static;
}


audio {
	position: fixed;
	bottom: 0px;
	right: 0px;
	z-index: 1;

}


#audiobutton-container {
	display: inline-block;
	margin: 0;
	padding: 0;
}

.bibliography-block {
	display: block;
	white-space: normal;
}

.bibliography-block b {
	display: inline;
	margin-bottom: 0;
}

.bibliographic-entry {
	display: block;
	font-size: 13px;
	line-height: 1.42;
	margin-top: 0;
	padding-left: 0;
	text-indent: 0;
	overflow-wrap: break-word;
	word-break: normal;
}

.bibliographic-entry + .bibliographic-entry {
	margin-top: 0;
}

.bibliographic-text {
	display: block;
	padding-left: var(--work-info-indent);
	text-indent: calc(-1 * var(--work-info-indent));
}

.mensuration-sign {
  height: 30px;
  margin-right: 0;
  vertical-align: middle;
  opacity: 0.9;
}

.mensuration-sign:first-of-type {
	margin-left: 0;
}

@media (max-width: 900px) {
	main {
		margin-left: 0;
		margin-right: 0;
	}

	.page-content {
		min-width: 0;
	}

	#work-info {
		width: calc(100% - 16px);
		max-width: 100%;
		margin-left: 8px;
		margin-right: 8px;
		padding: 12px;
		overflow-wrap: break-word;
	}

	#work-info tbody tr {
		grid-template-columns: 1fr;
		justify-content: stretch;
		gap: 14px;
	}

	#work-info td,
	#work-info td:nth-child(3) {
		justify-self: stretch;
		width: 100%;
		max-width: none;
	}

	.button-container,
	#analysis-plots {
		margin-left: 8px;
		margin-right: 8px;
	}

	.button,
	.analysis-toggle.button {
		height: auto;
		min-height: 32px;
	}

	.work-item,
	.source-item,
	.work-link-group,
	.mensuration-item,
	.bibliography-block,
	.bibliographic-entry,
	.bibliographic-text {
		max-width: 100%;
	}

	.work-link-group,
	.mensuration-item {
		grid-template-columns: max-content minmax(0, 1fr);
	}

	.work-link-list {
		flex-wrap: wrap;
	}

	.work-action-link {
		white-space: normal;
	}
}

</style>
